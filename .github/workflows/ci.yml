name: action_log

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: "25.7.0"

      - name: Log that CI ran
        run: echo "CI workflow ran for commit $GITHUB_SHA"
